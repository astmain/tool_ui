# =============================================================================
# format-markdown 配置文件（自动生成）
# =============================================================================
# 详细说明见扩展安装目录下的 README.md。
# 修改本文件后无需重启 VS Code，下一次执行右键 format-markdown 即生效。
# =============================================================================

rules:
  # 表格相关
  removeBlankLinesAfterTable: true
  removeBlankLinesBeforeTable: false
  alignTableColumns: true

  # 空行相关
  maxConsecutiveBlankLines: 1
  removeBlankLinesBetweenContent: true
  removeTrailingSpaces: true
  ensureFinalNewline: true

  # 标题前后空行（每级独立；取值 required / forbidden / keep）
  headings:
    h1: { before: required, after: forbidden }
    h2: { before: required, after: forbidden }
    h3: { before: required, after: forbidden }
    h4: { before: required, after: forbidden }
    h5: { before: required, after: forbidden }
    h6: { before: required, after: forbidden }

  spaceBetweenCnAndEn: false
  fixOrderedListNumbering: false

# 标题样式（颜色 / 粗细 / 字号 / 边框 / 间距；fontSize、border、margin 仅 preview 生效）
headingStyles:
  h1: { color: "#1A478C", bold: true, fontSize: 2.0,  border: false, borderColor: "#FFFFFF", borderWidth: 1, borderRadius: 6, padding: "4px 10px", marginTop: 0.6, marginBottom: 0.2 }
  h2: { color: "#2CD163", bold: true, fontSize: 1.6,  border: false, borderColor: "#FFFFFF", borderWidth: 1, borderRadius: 6, padding: "4px 10px", marginTop: 0.6, marginBottom: 0.2 }
  h3: { color: "#0075FF", bold: true, fontSize: 1.3,  border: false, borderColor: "#FFFFFF", borderWidth: 1, borderRadius: 6, padding: "4px 10px", marginTop: 0.6, marginBottom: 0.2 }
  h4: { color: "#00BBAA", bold: true, fontSize: 1.15, border: false, borderColor: "#FFFFFF", borderWidth: 1, borderRadius: 6, padding: "4px 10px", marginTop: 0.6, marginBottom: 0.2 }
  h5: { color: "#006633", bold: true, fontSize: 1.05, border: false, borderColor: "#FFFFFF", borderWidth: 1, borderRadius: 6, padding: "4px 10px", marginTop: 0.6, marginBottom: 0.2 }
  h6: { color: "#ABB2BF", bold: true, fontSize: 1.0,  border: false, borderColor: "#FFFFFF", borderWidth: 1, borderRadius: 6, padding: "4px 10px", marginTop: 0.6, marginBottom: 0.2 }

# 整段边框（标题 + 其下内容直到下一个标题，整段框起来；仅 preview 生效）
sectionBox:
  enabled: true
  borderColor: "#FFFFFF"
  borderWidth: 2
  borderRadius: 8
  padding: "6px 12px"
  marginBottom: 10

# 正文间距（段落/列表/列表项之间的竖向间距，单位 em；仅 preview 生效）
bodySpacing:
  enabled: true
  paragraphMargin: 0.3
  listMargin: 0.2
  listItemMargin: 0.1

exclude:
  - "node_modules/**"
  - ".git/**"
